<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<title>CASE CLOSED</title>

<style>
body{
  margin:0;
  font-family:"Tahoma","Vazirmatn","Arial";
  direction:rtl;
  color:white;
  overflow:hidden;
}

/* بک‌گراند */
.bg{
  position:fixed;
  inset:0;
  background:url("bar.png") no-repeat center center;
  background-size:cover;
  z-index:-2;
}

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.55);
  z-index:-1;
}

/* متن‌ها (درشت‌تر) */
.text{
  font-size:30px;   /* 👈 بزرگ‌تر شد */
  line-height:2.3;
  opacity:0;
  transition:1s;
}

/* کیس کلوزد */
#closed{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:90px;   /* 👈 خیلی درشت */
  font-weight:bold;
  opacity:0;
  background:rgba(255,0,0,0.85); /* 👈 قرمز واقعی */
  z-index:999;
  color:white;
}

/* لرزش واقعی */
.shake{
  animation: shake 0.08s infinite;
}

@keyframes shake{
  0%{transform:translate(0,0);}
  25%{transform:translate(6px,-6px);}
  50%{transform:translate(-6px,6px);}
  75%{transform:translate(6px,6px);}
  100%{transform:translate(0,0);}
}

/* پایان */
#end{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  flex-direction:column;
  opacity:0;
}

#finalText{
  font-size:32px;  /* 👈 خیلی درشت‌تر */
  line-height:2.5;
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="container">

  <div id="t1" class="text">تحقیقات تکمیل شد…</div>
  <div id="t2" class="text">نتیجه:</div>
  <div id="t3" class="text">مظنون مجرم نیست.</div>
  <div id="t4" class="text">قربانی هم نیست.</div>
  <div id="t5" class="text">پس چرا این پرونده تشکیل شد؟</div>

</div>

<!-- CASE CLOSED -->
<div id="closed">CASE CLOSED</div>

<!-- پایان -->
<div id="end">
  <div id="finalText">
    تمام سرنخ‌ها از ابتدا به یک نفر ختم می‌شد…<br><br>

    نه یک مجرم.<br><br>

    نه یک قربانی.<br><br>

    بلکه کسی که ارزش داشت برایش یک پرونده اختصاصی ساخته شود.<br><br>

    🎂♥️ تولدت مبارک مطهره
  </div>
</div>

<!-- صدا -->
<audio id="sound" src="stamp.mp3"></audio>

<script>

const texts = ["t1","t2","t3","t4","t5"];
let i = 0;

function showText(){

  if(i < texts.length){
    document.getElementById(texts[i]).style.opacity = 1;
    i++;
    setTimeout(showText, 2200);
  } else {
    triggerCaseClosed();
  }
}

function triggerCaseClosed(){

  let closed = document.getElementById("closed");
  let sound = document.getElementById("sound");

  sound.play();

  closed.style.opacity = 1;
  document.body.classList.add("shake");

  setTimeout(()=>{
    closed.style.opacity = 0;
    document.body.classList.remove("shake");
    showFinal();
  }, 2500);
}

function showFinal(){

  document.querySelector(".container").style.opacity = 0;

  setTimeout(()=>{
    document.getElementById("end").style.opacity = 1;
  }, 800);
}

window.onload = ()=>{
  setTimeout(showText, 1000);
};

</script>

</body>
</html>
