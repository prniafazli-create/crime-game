<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camera</title>

<style>
body{
  margin:0;
  background:black;
  overflow:hidden;
  font-family:sans-serif;
}

/* CAMERA */
video{
  width:100vw;
  height:100vh;
  object-fit:cover;
  transform:scaleX(-1);
}

/* VHS NOISE */
#vhs{
  position:fixed;
  inset:0;
  background:url("https://i.imgur.com/3ZQ3Z9m.gif");
  opacity:0;
  mix-blend-mode:screen;
  pointer-events:none;
}

/* SHAKE */
.shake{
  animation: shake 0.1s infinite;
}

@keyframes shake{
  0%{transform:translate(0,0)}
  25%{transform:translate(2px,-2px)}
  50%{transform:translate(-2px,2px)}
  75%{transform:translate(2px,2px)}
  100%{transform:translate(0,0)}
}

/* FLASH */
.flash{
  position:fixed;
  inset:0;
  background:white;
  opacity:0;
  pointer-events:none;
}

/* 👻 CLOWN (behind user FIXED) */
#clown{
  position:fixed;
  inset:0;
  background:url("https://i.imgur.com/8QfQX9Q.png") center/cover no-repeat;
  opacity:0;
  pointer-events:none;
  mix-blend-mode:screen;
  filter:brightness(0.4) contrast(1.4) blur(0.6px);
}

/* shadow ghost */
#ghost{
  position:fixed;
  inset:0;
  background:url("https://i.imgur.com/8QfQX9Q.png") center/cover no-repeat;
  opacity:0;
  pointer-events:none;
  filter:blur(2px);
  mix-blend-mode:screen;
}

/* black message */
#black{
  position:fixed;
  inset:0;
  background:black;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  font-size:18px;
  opacity:0;
  padding:20px;
}
</style>
</head>

<body>

<video id="cam" autoplay></video>

<div id="vhs"></div>
<div id="ghost"></div>
<div id="clown"></div>
<div id="flash"></div>
<div id="black"></div>

<!-- 😈 REAL HORROR LAUGH -->
<audio id="laugh" loop>
  <source src="https://www.soundjay.com/human/sounds/laugh-1.mp3">
</audio>

<script>

const video = document.getElementById("cam");
const vhs = document.getElementById("vhs");
const ghost = document.getElementById("ghost");
const clown = document.getElementById("clown");
const flash = document.getElementById("flash");
const black = document.getElementById("black");
const laugh = document.getElementById("laugh");

// CAMERA START
navigator.mediaDevices.getUserMedia({ video:true })
.then(stream=>{
  video.srcObject = stream;
});

// ghost appears behind user
setTimeout(()=>{
  ghost.style.opacity = "0.2";
}, 2000);

// MAIN SEQUENCE
setTimeout(()=>{

  // VHS ON (IMPORTANT FIX)
  vhs.style.opacity = "0.85";

  // SHAKE ON
  document.body.classList.add("shake");

  // FLASH EFFECT
  let i = 0;
  const flashInt = setInterval(()=>{
    flash.style.opacity = "1";
    setTimeout(()=>flash.style.opacity="0", 70);
    i++;
    if(i > 8) clearInterval(flashInt);
  }, 220);

  // 👻 REAL CLOWN APPEARS BEHIND USER (FIXED CORE REQUEST)
  setTimeout(()=>{
    clown.style.opacity = "0.35";
  }, 1200);

  // 😈 LAUGH SOUND (REAL HORROR)
  laugh.volume = 1;
  laugh.play().catch(()=>{});

  // FINAL HORROR MOMENT
  setTimeout(()=>{

    document.body.classList.remove("shake");
    vhs.style.opacity = "0.15";

    clown.style.opacity = "0.65";
    ghost.style.opacity = "0.35";

    // stronger presence
    laugh.volume = 0.4;

    black.style.opacity = "1";
    black.innerHTML = "او فقط پشت تو نبود... الان هم هست.";

    setTimeout(()=>{

      black.style.opacity = "0";
      clown.style.opacity = "0";
      ghost.style.opacity = "0";
      laugh.pause();

    }, 3500);

  }, 3500);

}, 3000);

</script>

</body>
</html>
