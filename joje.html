<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>joje chat</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0b0b0f;
  color:white;
}

/* CHAT */
#chat{
  padding:12px;
  height:calc(100vh - 140px);
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* MESSAGE */
.msg{
  max-width:75%;
  padding:10px;
  border-radius:12px;
  background:#3a0f1f;
}

/* ME */
.me{
  background:#1f1f2e;
  align-self:flex-start;
}

/* OTHER */
.other{
  background:#3a0f1f;
  align-self:flex-end;
}

/* VOICE */
audio{
  width:200px;
}

/* INPUT */
.inputBox{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  gap:8px;
  padding:10px;
  background:#111;
}

input{
  flex:1;
  padding:10px;
  border-radius:20px;
  border:none;
}

.send,.voice{
  width:45px;
  height:45px;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#ff4d4d;
  cursor:pointer;
}

/* CALL */
.callScreen{
  position:fixed;
  inset:0;
  background:#000;
  display:none;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.callAvatar{
  width:120px;
  height:120px;
  border-radius:50%;
  background:#2b2b3a;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:40px;
  animation:pulse 1s infinite;
}

@keyframes pulse{
  50%{transform:scale(1.05);}
}

.endBtn{
  margin-top:30px;
  width:70px;
  height:70px;
  border-radius:50%;
  background:red;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
  cursor:pointer;
}
</style>
</head>

<body>

<audio id="ring" src="bogh.mp3"></audio>

<!-- CHAT -->
<div id="chat"></div>

<!-- INPUT -->
<div class="inputBox">

  <!-- VOICE BUTTON -->
  <div class="voice"
       onmousedown="startRec()" 
       onmouseup="stopRec()"
       ontouchstart="startRec()"
       ontouchend="stopRec()">🎤</div>

  <input id="text" placeholder="پیام بنویس...">
  <div class="send" onclick="sendMsg()">➤</div>
</div>

<!-- CALL -->
<div class="callScreen" id="callScreen">
  <div class="callAvatar">📞</div>
  <div>جوجه سیرکی در حال تماس...</div>
  <div class="endBtn" onclick="endCall()">✖</div>
</div>

<script>

const chat=document.getElementById("chat");
const ring=document.getElementById("ring");

let recorder;
let chunks=[];
let autoCut;

/* messages */
function addMsg(type,content,voice=false){
  const div=document.createElement("div");
  div.className="msg "+type;

  if(voice){
    div.innerHTML=`🎧 ویس:<br><audio controls src="${content}"></audio>`;
  }else{
    div.innerHTML=content;
  }

  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

/* TEXT */
function sendMsg(){
  const input=document.getElementById("text");
  if(!input.value.trim()) return;

  addMsg("me",input.value);
  input.value="";
}

/* VOICE REC */
async function startRec(){
  const stream=await navigator.mediaDevices.getUserMedia({audio:true});
  recorder=new MediaRecorder(stream);
  chunks=[];

  recorder.ondataavailable=e=>chunks.push(e.data);

  recorder.onstop=()=>{
    const blob=new Blob(chunks,{type:"audio/webm"});
    const url=URL.createObjectURL(blob);
    addMsg("me",url,true);
  };

  recorder.start();
}

function stopRec(){
  if(recorder && recorder.state!=="inactive"){
    recorder.stop();
  }
}

/* CALL AUTO */
setTimeout(()=>startCall(),2000);

function startCall(){
  document.getElementById("callScreen").style.display="flex";
  ring.play();

  if(navigator.vibrate){
    navigator.vibrate([300,200,300,200,300]);
  }

  autoCut=setTimeout(endCall,8000);
}

function endCall(){
  document.getElementById("callScreen").style.display="none";
  ring.pause();
  ring.currentTime=0;
  clearTimeout(autoCut);
}

/* INIT */
addMsg("other","هنوزم موقع عصبی شدن ناخن‌هاتو می‌جَوی؟");
addMsg("me","هنوزم موقع ترسیدن زیاد حرف می‌زنی؟");

</script>

</body>
</html>
