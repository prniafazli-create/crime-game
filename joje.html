<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>joje chat</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0b0b0f;
  color:white;
}

/* TOP BAR */
.top{
  position:sticky;
  top:0;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px;
  background:rgba(20,20,30,0.85);
  backdrop-filter: blur(12px);
  border-bottom:1px solid rgba(255,255,255,0.1);
}

.profile{
  display:flex;
  align-items:center;
  gap:10px;
}

.avatar{
  width:35px;
  height:35px;
  border-radius:50%;
  background:#2b2b3a; /* دایره بدون عکس */
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
}

/* CALL BUTTONS */
.callBox{
  display:flex;
  gap:10px;
}

.btn{
  cursor:pointer;
  font-size:18px;
  opacity:0.8;
}

/* CHAT */
#chat{
  padding:12px;
  height:calc(100vh - 140px);
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  max-width:75%;
  padding:10px;
  border-radius:12px;
  font-size:14px;
}

.me{background:#1f1f2e; align-self:flex-start;}
.other{background:#3a0f1f; align-self:flex-end;}

/* INPUT */
.inputBox{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  gap:8px;
  padding:10px;
  background:#111;
}

input{
  flex:1;
  padding:10px;
  border-radius:20px;
  border:none;
  outline:none;
}

.send,.voice{
  width:45px;
  height:45px;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#ff4d4d;
  cursor:pointer;
}

/* CALL SCREEN */
.callScreen{
  position:fixed;
  inset:0;
  background:#000;
  display:none;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.callAvatar{
  width:120px;
  height:120px;
  border-radius:50%;
  background:#2b2b3a;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:40px;
  animation:pulse 1s infinite;
}

@keyframes pulse{
  50%{transform:scale(1.05);}
}

.endBtn{
  margin-top:30px;
  width:70px;
  height:70px;
  border-radius:50%;
  background:red;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
  cursor:pointer;
}
</style>
</head>

<body>

<audio id="ring" src="ring.mp3"></audio>
<audio id="bogh" src="bogh.mp3"></audio>

<!-- TOP -->
<div class="top">

  <div class="profile">
    <div class="avatar">🐥</div>
    <div>جوجه سیرکی</div>
  </div>

  <div class="callBox">
    <div class="btn" onclick="startCall()">📞</div>
    <div class="btn">🎥</div>
  </div>

</div>

<!-- CHAT -->
<div id="chat"></div>

<!-- INPUT -->
<div class="inputBox">
  <div class="voice">🎤</div>
  <input id="text" placeholder="پیام بنویس...">
  <div class="send" onclick="sendMsg()">➤</div>
</div>

<!-- CALL SCREEN -->
<div class="callScreen" id="callScreen">

  <div class="callAvatar">📞</div>
  <div>در حال تماس با جوجه سیرکی...</div>

  <div class="endBtn" onclick="endCall()">✖</div>
</div>

<script>

const chat=document.getElementById("chat");
const ring=document.getElementById("ring");
const bogh=document.getElementById("bogh");

let autoCut;

/* CHAT MESSAGES */
function add(type,text){
  const div=document.createElement("div");
  div.className="msg "+type;
  div.innerText=text;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

/* INITIAL CHAT */
add("other","داداش... میشه امشب تنها نمونه؟");
add("me","از چی می‌ترسی؟");
add("other","از تو نه...");

/* SEND */
function sendMsg(){
  const input=document.getElementById("text");
  if(!input.value.trim()) return;

  add("me",input.value);
  input.value="";
}

/* VOICE (fake simple) */
const voiceBtn=document.querySelector(".voice");
voiceBtn.onclick=()=>{
  add("me","🎤 پیام صوتی ارسال شد (دمو)");
}

/* CALL */
function startCall(){

  document.getElementById("callScreen").style.display="flex";

  // ring sound
  ring.currentTime=0;
  ring.play();

  // vibration
  if(navigator.vibrate){
    navigator.vibrate([400,300,400]);
  }

  // auto stop after 8 sec
  autoCut=setTimeout(endCall,8000);
}

/* END CALL */
function endCall(){

  document.getElementById("callScreen").style.display="none";

  ring.pause();
  bogh.pause();
  ring.currentTime=0;
  bogh.currentTime=0;

  clearTimeout(autoCut);
}

/* AUTO CALL AFTER 2 SEC */
setTimeout(()=>{
  startCall();
},2000);

</script>

</body>
</html>
