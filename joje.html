<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>chat</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0b0b0f;
  color:white;
}

/* TOP */
.top{
  position:sticky;
  top:0;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
  background:rgba(20,20,30,0.85);
  backdrop-filter:blur(12px);
}

.profile{
  display:flex;
  align-items:center;
  gap:10px;
}

.avatar{
  width:35px;
  height:35px;
  border-radius:50%;
  background:#2b2b3a;
}

/* CHAT */
#chat{
  padding:12px;
  height:calc(100vh - 180px);
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  max-width:75%;
  padding:10px 12px;
  border-radius:12px;
  font-size:14px;
  line-height:1.4;
}

.me{background:#1f1f2e; align-self:flex-start;}
.other{background:#3a0f1f; align-self:flex-end;}

/* INPUT */
.inputBox{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  gap:8px;
  padding:10px;
  background:rgba(20,20,30,0.9);
}

input{
  flex:1;
  padding:10px;
  border-radius:20px;
  border:none;
  background:#1e1e2a;
  color:white;
}

.send,.voice{
  width:42px;
  height:42px;
  border-radius:50%;
  background:#333;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
}

/* CALL */
.callScreen{
  position:fixed;
  inset:0;
  background:#000;
  display:none;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.callAvatar{
  width:120px;
  height:120px;
  border-radius:50%;
  overflow:hidden;
  border:2px solid #444;
}

.callAvatar img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.callText{
  margin-top:15px;
  font-size:18px;
}

.actions{
  margin-top:20px;
  display:flex;
  gap:15px;
}

.btn{
  padding:10px 16px;
  border-radius:20px;
  cursor:pointer;
}

.answer{background:#2ecc71;}
.decline{background:#e74c3c;}

.endBtn{
  margin-top:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  background:red;
  display:none;
  justify-content:center;
  align-items:center;
}
</style>
</head>

<body>

<audio id="ring" src="bogh.mp3"></audio>

<!-- TOP -->
<div class="top">
  <div class="profile">
    <div class="avatar"></div>
    <div>ШҙЩҲШ®ЫҢ ШЁЫҢвҖҢЩ…ШІЩҮ</div>
  </div>

  <div style="cursor:pointer;font-size:18px;" onclick="startCall()">рҹ“һ</div>
</div>

<!-- CHAT -->
<div id="chat"></div>

<!-- INPUT -->
<div class="inputBox">
  <div class="voice"
       onmousedown="startRec()"
       onmouseup="stopRec()"
       ontouchstart="startRec()"
       ontouchend="stopRec()">рҹҺӨ</div>

  <input id="text" placeholder="ЩҫЫҢШ§Щ… ШЁЩҶЩҲЫҢШі...">
  <div class="send" onclick="sendMsg()">вһӨ</div>
</div>

<!-- CALL -->
<div class="callScreen" id="callScreen">

  <div class="callAvatar">
    <img src="jan.png">
  </div>

  <div class="callText">ШҜШұ ШӯШ§Щ„ ШӘЩ…Ш§Ші ШЁШ§ Ш¬ЩҲШ¬ЩҮ ШіЫҢШұЪ©ЫҢ...</div>

  <div class="actions" id="actions">
    <div class="btn answer" onclick="answerCall()">Answer</div>
    <div class="btn decline" onclick="declineCall()">Decline</div>
  </div>

  <div class="endBtn" id="endBtn" onclick="endCall()">вң–</div>

</div>

<script>

const chat=document.getElementById("chat");
const ring=document.getElementById("ring");

let callStarted=false;
let timeoutCall;

/* CHAT */
const messages=[
{type:"other",text:"ЩҮЩҶЩҲШІЩ… Щ…ЩҲЩӮШ№ Ш№ШөШЁЫҢ ШҙШҜЩҶ ЩҶШ§Ш®ЩҶвҖҢЩҮШ§ШӘЩҲ Щ…ЫҢвҖҢШ¬ЩҺЩҲЫҢШҹ"},
{type:"me",text:"ЩҮЩҶЩҲШІЩ… Щ…ЩҲЩӮШ№ ШӘШұШіЫҢШҜЩҶ ШІЫҢШ§ШҜ ШӯШұЩҒ Щ…ЫҢвҖҢШІЩҶЫҢШҹ"},
{type:"other",text:"ЩҶЩҮ."},
{type:"other",text:"Ш§Щ„Ш§ЩҶ ЩҒЩӮШ· Щ…ЫҢвҖҢШҙЩ…ШұЩ…."},
{type:"me",text:"ЪҶЫҢ ШұЩҲШҹ"},
{type:"other",text:"Ъ©ШіШ§ЫҢЫҢ Ъ©ЩҮ ШЁШ№ШҜ Ш§ШІ ШўШҙЩҶШ§ЫҢЫҢ ШЁШ§ ШӘЩҲ ЩҶШ§ЩҫШҜЫҢШҜ ШҙШҜЩҶ."}
];

function render(){
  chat.innerHTML="";
  messages.forEach(m=>{
    const div=document.createElement("div");
    div.className="msg "+m.type;
    div.innerText=m.text;
    chat.appendChild(div);
  });
}

/* SEND TEXT */
function sendMsg(){
  const input=document.getElementById("text");
  if(!input.value.trim()) return;

  messages.push({type:"me",text:input.value});
  input.value="";
  render();
}

/* CALL (only once auto) */
setTimeout(()=>{
  if(!callStarted){
    incomingCall();
    callStarted=true;
  }
},2000);

/* manual call */
function startCall(){
  if(!callStarted){
    incomingCall();
    callStarted=true;
  }
}

function incomingCall(){
  document.getElementById("callScreen").style.display="flex";

  ring.currentTime=0;
  ring.play();

  if(navigator.vibrate){
    navigator.vibrate([400,200,400]);
  }

  timeoutCall=setTimeout(()=>{
    endCall();
  },8000);
}

/* ANSWER */
function answerCall(){
  ring.pause();
  document.getElementById("actions").style.display="none";
  document.getElementById("endBtn").style.display="flex";
}

/* DECLINE */
function declineCall(){
  endCall();
}

/* END */
function endCall(){
  document.getElementById("callScreen").style.display="none";
  ring.pause();
  clearTimeout(timeoutCall);
}

/* VOICE REC */
let recorder;
let chunks=[];

async function startRec(){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    recorder=new MediaRecorder(stream);
    chunks=[];

    recorder.ondataavailable=e=>chunks.push(e.data);

    recorder.onstop=()=>{
      const blob=new Blob(chunks,{type:"audio/webm"});
      const url=URL.createObjectURL(blob);

      messages.push({
        type:"me",
        voice:url
      });

      render();
    };

    recorder.start();
  }catch(e){
    alert("Ш§Ш¬Ш§ШІЩҮ Щ…ЫҢЪ©ШұЩҲЩҒЩҲЩҶ Щ„Ш§ШІЩ… Ш§ШіШӘ");
  }
}

function stopRec(){
  if(recorder && recorder.state!=="inactive"){
    recorder.stop();
  }
}

render();

</script>

</body>
</html>
