<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مرورگر پرونده</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0f0f0f;
  color:white;
  overflow:hidden;
}

/* TOP BAR */
#top{
  display:flex;
  align-items:center;
  padding:10px;
  background:#1a1a1a;
}

#url{
  flex:1;
  padding:10px;
  border:none;
  outline:none;
  border-radius:8px;
}

button{
  margin-left:10px;
  padding:10px 15px;
  background:red;
  color:white;
  border:none;
  border-radius:8px;
}

/* HISTORY */
#history{
  position:absolute;
  top:60px;
  left:10px;
  right:10px;
  bottom:10px;
  overflow:auto;
  padding:10px;
}

.item{
  background:#222;
  padding:10px;
  margin-bottom:8px;
  border-radius:8px;
  font-size:14px;
}

/* GLITCH */
.glitch{
  animation:flicker 0.2s infinite;
}

@keyframes flicker{
  0%{opacity:1}
  50%{opacity:0.6}
  100%{opacity:1}
}

/* SECRET */
#secret{
  position:fixed;
  bottom:10px;
  left:10px;
  font-size:12px;
  opacity:0.3;
}
</style>
</head>

<body>

<div id="top">
  <input id="url" placeholder="جستجو کنید..." />
  <button onclick="search()">جستجو</button>
</div>

<div id="history"></div>
<div id="secret">CASE FILE ACTIVE...</div>

<script>

const historyBox = document.getElementById("history");
const input = document.getElementById("url");

let searches = JSON.parse(localStorage.getItem("history") || "[]");

const darkSearches = [
"چگونه ردپا را پاک کنیم",
"چرا کسی پشت سر من ایستاده",
"صداهای ناشناخته در خانه",
"چه کسی وارد تاریخچه من شده",
"چرا تلفن خود به خود روشن می‌شود",
"آخرین کسی که اینجا بود کجاست",
"اگر کسی تو را زیر نظر داشته باشد"
];

function render(){
  historyBox.innerHTML = "";
  searches.slice().reverse().forEach(t=>{
    const div = document.createElement("div");
    div.className = "item glitch";
    div.innerText = "🔎 " + t;
    historyBox.appendChild(div);
  });
}

render();

function search(){

  let value = input.value;
  if(!value) return;

  searches.push(value);

  if(Math.random() > 0.4){
    searches.push(darkSearches[Math.floor(Math.random()*darkSearches.length)]);
  }

  localStorage.setItem("history", JSON.stringify(searches));
  input.value = "";
  render();
}

/* =========================
   🌐 LIVE BROWSER ENGINE
========================= */

function fakeType(){

  const texts = [
    "کجای روستا خلوت‌ترین جاست",
    "چگونه خوشتیپ استایل بزنم",
    "چگونه یه دختر را خوشحال کنم",
    "خرید گل برای کسی که نمی‌شناسم",
    "چه کسی تاریخچه من را تغییر داد",
    "چرا مرورگر رفتار عجیبی دارد"
  ];

  let text = texts[Math.floor(Math.random()*texts.length)];
  input.value = "";

  let i = 0;
  let typing = setInterval(()=>{

    input.value += text[i];
    i++;

    if(i >= text.length){
      clearInterval(typing);

      setTimeout(()=>{
        search();
      }, 700);
    }

  }, 70);
}

/* browser feels alive */
setInterval(()=>{
  fakeType();
}, 11000);

/* history corruption */
setInterval(()=>{
  searches.push(">>> دسترسی غیرمجاز به مرورگر");
  localStorage.setItem("history", JSON.stringify(searches));
  render();
}, 14000);

/* small random glitch push */
setInterval(()=>{
  document.body.style.filter = "contrast(1.1)";
  setTimeout(()=>{
    document.body.style.filter = "none";
  }, 200);
}, 5000);

</script>

</body>
</html>
