<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Clown Phone</title>

<link rel="stylesheet" href="phone.css">

</head>

<body>

<div class="phone">

<div class="wallpaper"></div>

<div class="screen-dark"></div>

<div class="status-bar">

<div class="status-left">

<span id="clock">03:48</span>

</div>

<div class="status-right">

<span id="network">4G</span>

<span id="signal">📶</span>

<span id="wifi">📡</span>

<span id="batteryText">75%</span>

<span id="battery">🔋</span>

</div>

</div>

<div class="lock-area">

<div class="lock-icon">
🔒
</div>

<div id="bigClock" class="big-clock">
03:48
</div>

<div id="date" class="date">
چهارشنبه، ۲۵ تیر
</div>

</div>

<div class="notification">

<div class="notification-title">
⚠ اعلان جدید
</div>

<div class="notification-text">
یک پیام خوانده‌نشده وجود دارد...
</div>

</div>

<div class="pattern-text">

برای باز کردن قفل

<br>

الگوی ستاره را رسم کنید

</div>

<div class="pattern-container">

<div class="dot" data-id="1"></div>
<div class="dot" data-id="2"></div>
<div class="dot" data-id="3"></div>

<div class="dot" data-id="4"></div>
<div class="dot" data-id="5"></div>
<div class="dot" data-id="6"></div>

<div class="dot" data-id="7"></div>
<div class="dot" data-id="8"></div>
<div class="dot" data-id="9"></div>

<canvas id="patternCanvas"></canvas>

</div>

<div class="home-bar"></div>

</div>

<script src="phone.js"></script>

</body>
</html>
