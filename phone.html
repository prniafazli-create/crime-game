<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Clown Phone</title>

<link rel="stylesheet" href="phone.css">

</head>

<body>

<div class="phone">

    <!-- تصویر زمینه -->
    <img src="oh.png" class="wallpaper">

    <!-- لایه تیره -->
    <div class="dark-layer"></div>

    <!-- نوار وضعیت -->
    <div class="status-bar">

        <div class="status-left">

            <span id="clock">22:15</span>

        </div>

        <div class="status-right">

            <span>📶</span>

            <span>📡</span>

            <span>🔋100%</span>

        </div>

    </div>

    <!-- تاریخ -->
    <div class="date-box">

        <div id="date">
            چهارشنبه، ۱۱ مهر
        </div>

    </div>

    <!-- الگوی ستاره -->
    <div class="pattern-area">

        <svg id="patternLines"></svg>

        <div class="pattern-grid">

            <div class="dot" data-id="1"></div>

            <div class="dot" data-id="2"></div>

            <div class="dot" data-id="3"></div>

            <div class="dot" data-id="4"></div>

            <div class="dot center" data-id="5"></div>

            <div class="dot" data-id="6"></div>

            <div class="dot" data-id="7"></div>

            <div class="dot" data-id="8"></div>

            <div class="dot" data-id="9"></div>

            <div class="dot" data-id="10"></div>

        </div>

    </div>

    <!-- هشدار -->
    <div id="message" class="message"></div>

    <!-- انیمیشن باز شدن -->
    <div id="unlockFlash"></div>

</div>

<script src="phone.js"></script>

</body>

</html>
