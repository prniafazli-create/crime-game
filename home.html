<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home OS</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  overflow:hidden;
}

/* ===== WALLPAPER ===== */
#home{
  position:fixed;
  inset:0;
  background:url("red.png") center/cover no-repeat;
  display:flex;
  flex-direction:column;
}

/* ===== STATUS BAR ===== */
#statusBar{
  display:flex;
  justify-content:space-between;
  padding:10px 15px;
  font-size:12px;
  color:white;
  background:rgba(0,0,0,0.25);
  backdrop-filter:blur(5px);
}

/* ===== SCROLL AREA ===== */
#appsWrapper{
  flex:1;
  overflow-y:auto;
  padding:20px;
}

/* GRID */
#apps{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:20px;
}

/* APP */
.app{
  text-align:center;
  color:white;
  font-size:11px;
  cursor:pointer;
}

.icon{
  width:58px;
  height:58px;
  margin:auto;
  border-radius:16px;
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(6px);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  transition:0.15s;
}

.app:active .icon{
  transform:scale(0.88);
}

/* ===== DOCK ===== */
#dock{
  display:flex;
  justify-content:space-around;
  padding:10px;
  background:rgba(0,0,0,0.35);
  backdrop-filter:blur(10px);
}

.dockIcon{
  width:52px;
  height:52px;
  border-radius:16px;
  background:rgba(255,255,255,0.2);
}

/* SCROLL BAR HIDE */
#appsWrapper::-webkit-scrollbar{
  display:none;
}
</style>
</head>

<body>

<div id="home">

  <!-- STATUS -->
  <div id="statusBar">
    <div>📶 LTE 4G</div>
    <div>12:45 🔋 85%</div>
  </div>

  <!-- APPS -->
  <div id="appsWrapper">
    <div id="apps">

      <!-- TOP APPS -->
      <div class="app" onclick="openApp('phone.html')">
        <div class="icon">📞</div>
        Phone
      </div>

      <div class="app" onclick="openApp('messages.html')">
        <div class="icon">💬</div>
        Messages
      </div>

      <div class="app" onclick="openApp('camera.html')">
        <div class="icon">📷</div>
        Camera
      </div>

      <div class="app" onclick="openApp('gallery.html')">
        <div class="icon">🖼</div>
        Gallery
      </div>

      <div class="app" onclick="openApp('files.html')">
        <div class="icon">📁</div>
        Files
      </div>

      <div class="app" onclick="openApp('notes.html')">
        <div class="icon">📝</div>
        Notes
      </div>

      <div class="app" onclick="openApp('browser.html')">
        <div class="icon">🌐</div>
        Browser
      </div>

      <div class="app" onclick="openApp('recorder.html')">
        <div class="icon">🎙</div>
        Recorder
      </div>

      <div class="app" onclick="openApp('contacts.html')">
        <div class="icon">👤</div>
        Contacts
      </div>

      <div class="app" onclick="openApp('maps.html')">
        <div class="icon">📍</div>
        Maps
      </div>

      <div class="app" onclick="openApp('settings.html')">
        <div class="icon">⚙</div>
        Settings
      </div>

      <div class="app" onclick="openApp('music.html')">
        <div class="icon">🎵</div>
        Music
      </div>

      <div class="app" onclick="openApp('instagram.html')">
        <div class="icon">📸</div>
        Instagram
      </div>

      <div class="app" onclick="fakeApp()">
        <div class="icon">⬛</div>
        Black Box
      </div>

      <div class="app" onclick="fakeApp()">
        <div class="icon">◼</div>
        Unknown
      </div>

      <div class="app" onclick="fakeApp()">
        <div class="icon">?</div>
        ????
      </div>

      <div class="app" onclick="fakeApp()">
        <div class="icon">👁</div>
        Hidden
      </div>

    </div>
  </div>

  <!-- DOCK (UPDATED) -->
  <div id="dock">

    <div class="dockIcon" onclick="openApp('camera.html')">📷</div>
    <div class="dockIcon" onclick="openApp('messages.html')">💬</div>
    <div class="dockIcon" onclick="openApp('phone.html')">📞</div>

  </div>

</div>

<script>

function openApp(page){
  window.location.href = page;
}

/* fake scary apps */
function fakeApp(){
  document.body.style.animation = "shake 0.2s";
  setTimeout(()=>document.body.style.animation="",200);
}

</script>

</body>
</html>
