<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Map - Unknown Signal</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
html,body{
  margin:0;
  height:100%;
  background:#000;
  font-family:sans-serif;
  overflow:hidden;
}

/* نقشه تاریک */
#map{
  width:100%;
  height:100%;
  filter: brightness(0.6) contrast(1.3) grayscale(0.4);
}

/* نوتیف */
#notif{
  position:absolute;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.85);
  border:1px solid red;
  color:#fff;
  padding:10px 18px;
  border-radius:10px;
  display:none;
  z-index:9999;
  font-size:14px;
}

/* پنل معما */
#panel{
  position:absolute;
  bottom:80px;
  left:50%;
  transform:translateX(-50%);
  width:85%;
  max-width:320px;
  background:rgba(0,0,0,0.85);
  border:1px solid #222;
  border-radius:15px;
  padding:15px;
  color:#fff;
  z-index:9999;
}

input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
  border:none;
  outline:none;
  background:#111;
  color:#fff;
}

button{
  width:100%;
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:red;
  color:#fff;
  cursor:pointer;
}

.small{
  font-size:12px;
  opacity:0.7;
  margin-top:5px;
}

/* مسیر قرمز */
.red-glow{
  stroke:red;
  stroke-width:4;
  opacity:0.9;
  filter: drop-shadow(0 0 6px red);
}
</style>
</head>

<body>

<div id="notif"></div>

<div id="map"></div>

<div id="panel">
  <div>🧩 معما</div>
  <div class="small">او با چه کسی اینجا بوده؟</div>

  <input id="ans" placeholder="پاسخ را وارد کنید...">
  <button onclick="check()">تأیید</button>
</div>

<script>

// ---------------- MAP ----------------
const map = L.map('map').setView([40.4093, 49.8671], 14);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19
}).addTo(map);

// ---------------- NOTIF ----------------
function notify(t){
  const n = document.getElementById("notif");
  n.innerText = t;
  n.style.display = "block";
  setTimeout(()=>n.style.display="none",2500);
}

// ---------------- PUZZLE LOCATION (FOREST AREA FEEL) ----------------
const puzzle = L.marker([40.4140, 49.8580]).addTo(map)
.bindPopup("🌲 نقطه ناشناخته در جنگل");

// ---------------- ANSWER LOGIC ----------------
let solved = false;

function check(){
  const v = document.getElementById("ans").value.trim();

  if(solved) return;

  if(v === "میتسوکی" || v === "میتسوکی آمانه"){
    solved = true;
    notify("✔ سیگنال تأیید شد... مسیر در حال ظاهر شدن");
    drawPath();
  } else {
    notify("❌ اشتباه");
  }
}

// ---------------- HIDDEN RED PATH ----------------
function drawPath(){

  const path = [
    [40.4140, 49.8580], // جنگل
    [40.4125, 49.8605],
    [40.4108, 49.8630],
    [40.4095, 49.8660],
    [40.4080, 49.8685] // مقصد نامشخص
  ];

  const line = L.polyline(path, {
    color:"red",
    weight:4,
    opacity:0.9,
    className:"red-glow"
  }).addTo(map);

  // انیمیشن ظاهر شدن مرحله‌ای
  let i = 0;
  const interval = setInterval(()=>{
    if(i >= path.length){
      clearInterval(interval);
      notify("📍 مقصد نامشخص فعال شد...");
      return;
    }

    L.circleMarker(path[i],{
      radius:6,
      color:"red"
    }).addTo(map);

    i++;
  },500);
}

</script>

</body>
</html>
