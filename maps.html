<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Unknown Signal Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
html,body{
  margin:0;
  padding:0;
  height:100%;
  width:100%;
  overflow:hidden;
  background:#000;
  font-family:sans-serif;
}

/* نقشه تمام صفحه */
#map{
  position:fixed;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
}

/* نوتیف */
#notif{
  position:absolute;
  top:15px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.85);
  border:1px solid red;
  color:#fff;
  padding:10px 15px;
  border-radius:10px;
  display:none;
  z-index:9999;
  font-size:13px;
}

/* پنل معما */
#panel{
  position:absolute;
  top:15px;
  left:15px;
  width:230px;
  background:rgba(0,0,0,0.75);
  border-radius:12px;
  padding:12px;
  color:#fff;
  z-index:9999;
  font-size:13px;
}

input,button{
  width:100%;
  margin-top:8px;
  padding:8px;
  border-radius:8px;
  border:none;
  outline:none;
}

input{
  background:#111;
  color:#fff;
}

button{
  background:red;
  color:#fff;
  cursor:pointer;
}

/* سرچ */
#searchBox{
  position:absolute;
  top:15px;
  right:15px;
  width:200px;
  z-index:9999;
}

#searchBox input{
  background:#111;
  color:#fff;
  border:1px solid #333;
}

/* مقصد */
.destination-label{
  background:rgba(0,0,0,0.7);
  color:#fff;
  padding:5px 8px;
  border:1px solid red;
  border-radius:8px;
  font-size:12px;
}

/* مسیر */
.red-line{
  stroke:red;
  stroke-width:4;
  filter: drop-shadow(0 0 6px red);
}
</style>
</head>

<body>

<div id="notif"></div>

<div id="panel">
  🧩 معما<br>
  <small>او با چه کسی اینجا بوده؟</small>
  <input id="ans" placeholder="پاسخ...">
  <button onclick="check()">تأیید</button>
</div>

<div id="searchBox">
  <input placeholder="جستجو..." oninput="fakeSearch(this.value)">
</div>

<div id="map"></div>

<script>

let map;
let solved = false;
let history = [];

const fakeQueries = [
  "سیگنال ناشناخته شناسایی شد...",
  "داده در حال رمزگشایی است...",
  "اتصال غیرمجاز ثبت شد",
  "ردیابی در حال اجراست...",
  "هیچ داده‌ای یافت نشد",
  "سیستم در حالت ناشناخته"
];

// ================= MAP INIT =================
function initMap(){

  const W = 4000;
  const H = 4000;

  map = L.map('map', {
    crs: L.CRS.Simple,
    minZoom: -2,
    maxZoom: 3,

    zoomControl: true,

    dragging: false,        // ❌ حرکت ممنوع
    scrollWheelZoom: true,  // ✔ زوم
    doubleClickZoom: false,
    boxZoom: false,
    keyboard: false
  });

  const bounds = [[0,0],[H,W]];

  L.imageOverlay("map.png", bounds).addTo(map);

  map.fitBounds(bounds);
  map.setMaxBounds(bounds);

  setupPuzzle();
}

// ================= PUZZLE =================
function setupPuzzle(){

  const point = L.latLng(900, 900);

  L.circleMarker(point,{
    radius:8,
    color:"red"
  }).addTo(map).bindPopup("🧩 نقطه معما");
}

// ================= NOTIF =================
function notify(t){
  const n = document.getElementById("notif");
  n.innerText = t;
  n.style.display = "block";
  setTimeout(()=>n.style.display="none",2000);
}

// ================= CHECK =================
function check(){
  if(solved) return;

  const v = document.getElementById("ans").value.trim();

  if(v === "میتسوکی" || v === "میتسوکی آمانه"){
    solved = true;

    notify("✔ سیگنال تأیید شد");

    document.getElementById("panel").style.display = "none";

    drawPath();
  } else {
    notify("❌ پاسخ اشتباه");
  }
}

// ================= PATH =================
function drawPath(){

  const center = [2000, 2000];

  const path = [
    [900,900],
    [1300,1500],
    [1700,1800],
    center
  ];

  L.polyline(path,{
    color:"red",
    weight:4,
    className:"red-line"
  }).addTo(map);

  L.circleMarker(center,{
    radius:10,
    color:"red"
  }).addTo(map);

  L.marker(center,{
    icon: L.divIcon({
      className:"destination-label",
      html:"📍 مقصد نامشخص"
    })
  }).addTo(map);

  notify("📍 مسیر فعال شد...");
}

// ================= SEARCH =================
function fakeSearch(v){
  if(v.length > 2){

    history.push(v);

    const msg = fakeQueries[Math.floor(Math.random()*fakeQueries.length)];

    notify("🔎 " + msg);

    console.log("History:", history);
  }
}

// ================= START =================
initMap();

</script>

</body>
</html>
