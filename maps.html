<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unknown Signal Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
html,body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
  font-family:sans-serif;
}

#map{
  position:fixed;
  inset:0;
  width:100vw;
  height:100vh;
}

/* UI */
#notif{
  position:absolute;
  top:15px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.85);
  border:1px solid red;
  color:#fff;
  padding:10px 15px;
  border-radius:10px;
  display:none;
  z-index:9999;
  font-size:13px;
}

/* پنل */
#panel{
  position:absolute;
  top:15px;
  left:15px;
  width:230px;
  background:rgba(0,0,0,0.75);
  border-radius:12px;
  padding:12px;
  color:#fff;
  z-index:9999;
  font-size:13px;
}

/* تاریخچه (سفید واضح) */
#history{
  display:none;
  margin-top:6px;
  background:rgba(0,0,0,0.85);
  border:1px solid red;
  border-radius:10px;
  max-height:150px;
  overflow:auto;
}

#history div{
  padding:6px;
  font-size:12px;
  border-bottom:1px solid #222;
  cursor:pointer;
  color:#fff; /* مهم: سفید */
}

/* سرچ */
#searchBox{
  position:absolute;
  top:15px;
  right:15px;
  width:200px;
  z-index:9999;
}

#searchBox input{
  width:100%;
  padding:8px;
  border-radius:8px;
  background:#111;
  color:#fff;
  border:1px solid #333;
}

/* مقصد */
.destination-label{
  background:rgba(0,0,0,0.7);
  color:#fff;
  padding:5px 8px;
  border:1px solid red;
  border-radius:8px;
  font-size:12px;
}

/* مسیر */
.red-line{
  stroke:red;
  stroke-width:4;
  filter: drop-shadow(0 0 6px red);
}
</style>
</head>

<body>

<div id="notif"></div>

<div id="panel">
🧩 معما<br>
<small>او با چه کسی اینجا بوده؟</small>
<input id="ans" placeholder="پاسخ...">
<button onclick="check()">تأیید</button>
</div>

<div id="searchBox">
<input placeholder="جستجو..." oninput="fakeSearch(this.value)" onclick="showHistory()">
<div id="history"></div>
</div>

<div id="map"></div>

<script>

let map;
let solved=false;

/* تاریخچه‌ها */
const fakeHistory=[
"سیگنال از لایه 7 فعال شد",
"کاربر ناشناس: N-442 ثبت شد",
"داده حذف شده اما هنوز قابل مشاهده است",
"اتصال به هیچ‌جا برقرار شد"
];

/* پیام‌ها */
const fakeQueries=[
"سیگنال ناشناخته شناسایی شد...",
"داده در حال رمزگشایی است...",
"اتصال غیرمجاز ثبت شد",
"ردیابی در حال اجراست..."
];

/* notif */
function notify(t){
  const n=document.getElementById("notif");
  n.innerText=t;
  n.style.display="block";
  setTimeout(()=>n.style.display="none",2000);
}

/* MAP */
function initMap(){

  const img=new Image();
  img.src="map.png";

  img.onload=function(){

    const W=img.naturalWidth * 1.4; // 👈 بزرگ‌تر شدن نقشه
    const H=img.naturalHeight * 1.4;

    map=L.map("map",{
      crs:L.CRS.Simple,
      minZoom:-2,
      maxZoom:4,
      zoomControl:true,
      dragging:true,
      scrollWheelZoom:true,
      maxBoundsViscosity:1
    });

    const bounds=[[0,0],[H,W]];

    L.imageOverlay("map.png",bounds).addTo(map);

    map.fitBounds(bounds);
    map.setMaxBounds(bounds);

    setupPuzzle();
  }
}

/* نقطه معما (همون پایین چپ مثل نسخه قبلی) */
function setupPuzzle(){

  const p=[1800,600]; // 👈 پایین چپ جنگلی

  L.circleMarker(p,{
    radius:8,
    color:"red"
  }).addTo(map).bindPopup("🧩 نقطه معما");
}

/* check */
function check(){

  const v=document.getElementById("ans").value.trim();

  if(v==="میتسوکی" || v==="میتسوکی آمانه"){

    document.getElementById("panel").style.display="none";

    notify("✔ تأیید شد");

    drawPath();
  }
}

/* مسیر از کنار باکس تا مرکز */
function drawPath(){

  const start=[1500,800];   // کنار پنل
  const center=[2000,1500]; // وسط

  const path=[start,[1700,1200],center];

  L.polyline(path,{
    color:"red",
    weight:4,
    className:"red-line"
  }).addTo(map);

  map.flyTo(center,2.5,{duration:2});

  L.marker(center,{
    icon:L.divIcon({
      className:"destination-label",
      html:"📍 مقصد نامشخص"
    })
  }).addTo(map);
}

/* history */
function showHistory(){
  const box=document.getElementById("history");
  box.style.display="block";
  box.innerHTML="";

  fakeHistory.forEach(h=>{
    const d=document.createElement("div");
    d.innerText=h;
    box.appendChild(d);
  });
}

/* search */
function fakeSearch(v){
  if(v.length>2){
    notify(fakeQueries[Math.floor(Math.random()*fakeQueries.length)]);
  }
}

/* start */
initMap();

</script>

</body>
</html>
