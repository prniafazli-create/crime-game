<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:url("musicback.png") center/cover no-repeat;
  color:white;
  overflow:hidden;
}

/* dark overlay */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.75);
}

/* HEADER */
#topBar{
  padding:15px;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(10px);
  text-align:center;
  font-size:14px;
  position:relative;
  z-index:2;
}

/* NOW PLAYING */
#nowPlaying{
  text-align:center;
  padding:20px;
  position:relative;
  z-index:2;
}

#trackName{
  font-size:18px;
  transition:0.3s;
}

/* CONTROLS */
#controls{
  display:flex;
  justify-content:center;
  gap:20px;
  margin:10px;
  position:relative;
  z-index:2;
}

button{
  background:rgba(255,255,255,0.1);
  border:none;
  color:white;
  padding:10px 15px;
  border-radius:10px;
  font-size:18px;
}

/* PROGRESS */
#progress{
  width:90%;
  height:5px;
  background:#333;
  margin:20px auto;
  border-radius:5px;
  overflow:hidden;
  position:relative;
  z-index:2;
}

#bar{
  height:100%;
  width:0%;
  background:#ff3b3b;
}

/* PLAYLIST */
#list{
  height:55vh;
  overflow-y:auto;
  padding:10px;
  position:relative;
  z-index:2;
}

.track{
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px;
  margin:8px 0;
  background:rgba(255,255,255,0.06);
  border-radius:12px;
  cursor:pointer;
  transition:0.2s;
}

.track:active{
  transform:scale(0.97);
  background:rgba(255,255,255,0.15);
}

.track img{
  width:40px;
  height:40px;
  border-radius:50%;
  object-fit:cover;
}

/* SCARY TEXT */
#warning{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  font-size:12px;
  opacity:0;
  transition:0.5s;
  color:#ff4d4d;
  z-index:3;
}

#warning.show{
  opacity:1;
}

/* glitch */
.glitch{
  animation:glitch 0.3s infinite;
}

@keyframes glitch{
  0%{transform:translate(0)}
  25%{transform:translate(1px,-1px)}
  50%{transform:translate(-1px,1px)}
  75%{transform:translate(1px,1px)}
  100%{transform:translate(0)}
}
</style>
</head>

<body>

<div id="topBar">🎧 Music System</div>

<div id="nowPlaying">
  <div id="trackName">هیچ آهنگی انتخاب نشده</div>
</div>

<div id="controls">
  <button onclick="prev()">⏮</button>
  <button onclick="toggle()">▶️/⏸</button>
  <button onclick="next()">⏭</button>
</div>

<div id="progress">
  <div id="bar"></div>
</div>

<div id="list"></div>

<div id="warning">⚠️ این فایل صوتی رفتار غیرعادی دارد...</div>

<audio id="audio"></audio>

<script>

const tracks = [
["espresso.mp3","espresso.jpg"],
["romantic.mp3","romantic.jpg"],
["bauklotze.mp3","bauklotze.jpg"],
["dari.mp3","dari.jpg"],
["death.mp3","death.jpg"],
["train.mp3","train.jpg"],
["mystezrious.mp3","mystezrious.jpg"],
["ground.mp3","ground.png"],
["spaansche.mp3","spaansche.jpg"],
["you..mp3","you..jpg"],
["put.mp3","put.jpg"],
["black.mp3","black.png"],
["love.mp3","love.jpg"],
["hunted.mp3","hunted.jpg"],
["track.mp3","track.jpg"],
["show.mp3","show.jpg"],
["chess.mp3","chess.jpg"],
["fourth.mp3","fourth.jpg"],
["wind.mp3","wind.jpg"]
];

let index = 0;
let audio = document.getElementById("audio");

const trackName = document.getElementById("trackName");
const bar = document.getElementById("bar");
const warning = document.getElementById("warning");

/* build list */
tracks.forEach((t,i)=>{
  let div = document.createElement("div");
  div.className="track";
  div.innerHTML = `
    <img src="${t[1]}">
    <div>${t[0]}</div>
  `;
  div.onclick = ()=>play(i);
  document.getElementById("list").appendChild(div);
});

function play(i){
  index = i;
  audio.src = tracks[index][0];
  audio.play();

  trackName.innerText = "در حال پخش: " + tracks[index][0];

  scaryEffects(tracks[index][0]);

  /* گاهی خودکار یه ترک بعدی (کم تکرار) */
  if(Math.random() < 0.25){
    audio.onended = ()=>next();
  } else {
    audio.onended = next;
  }
}

/* controls */
function toggle(){
  if(audio.paused) audio.play();
  else audio.pause();
}

function next(){
  index = (index+1)%tracks.length;
  play(index);
}

function prev(){
  index = (index-1+tracks.length)%tracks.length;
  play(index);
}

/* progress */
audio.addEventListener("timeupdate", ()=>{
  let p = (audio.currentTime / audio.duration)*100;
  bar.style.width = p + "%";
});

/* SCARY SYSTEM */
function scaryEffects(name){

  document.body.classList.remove("glitch");

  let scary = ["death.mp3","black.mp3","mystezrious.mp3","hunted.mp3","you..mp3"];

  if(scary.includes(name)){
    document.body.classList.add("glitch");

    warning.classList.add("show");

    if(navigator.vibrate){
      navigator.vibrate([200,100,200]);
    }

    setTimeout(()=>{
      warning.classList.remove("show");
    },3000);

    let texts = [
      "⚠ این صدا نباید پخش می‌شد...",
      "👁 کسی در حال گوش دادن است...",
      "📡 سیگنال ناشناس شناسایی شد",
      "☠ این فایل حذف نشده..."
    ];

    trackName.innerText = texts[Math.floor(Math.random()*texts.length)];
  }
}

</script>

</body>
</html>
