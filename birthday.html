<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<title>DAY FILE</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:url("maz.png") no-repeat center center fixed;
  background-size:cover;
  color:white;
  overflow:hidden;
}

/* لایه تاریک برای حس رازآلود */
.overlay{
  position:fixed;
  top:0;left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.75);
}

/* متن اولیه (ناگهانی ظاهر میشه) */
.intro{
  position:absolute;
  top:30%;
  width:100%;
  text-align:center;
  font-size:16px;
  line-height:2;
  opacity:0;
  animation: showText 3s forwards;
}

@keyframes showText{
  0%{opacity:0;}
  100%{opacity:1;}
}

/* باکس معما پایین صفحه */
.puzzle-box{
  position:absolute;
  bottom:-200px;
  left:50%;
  transform:translateX(-50%);
  width:80%;
  background:rgba(0,0,0,0.8);
  border:1px solid #444;
  padding:15px;
  transition:0.8s;
}

/* وقتی فعال میشه */
.puzzle-box.show{
  bottom:40px;
}

/* ورودی */
input{
  width:70%;
  padding:10px;
  border:none;
  outline:none;
  text-align:center;
}

button{
  padding:10px 15px;
  background:red;
  color:white;
  border:none;
  cursor:pointer;
}
button:hover{
  background:#aa0000;
}

/* پیام */
.msg{
  margin-top:10px;
  font-size:14px;
}
</style>
</head>

<body>

<div class="overlay"></div>

<!-- متن اولیه -->
<div class="intro">
  تحت نظر از مدت ها قبل...<br>
  ارتباط با افراد ناشناس تایید شد.<br>
  تاریخ مهم: ۱۳۸۷/۴/۶<br><br>

  یک شب در قطار، خواب و هذیان دست به دست هم دادند.<br>
  بازیگر فیلمی که در سفر نهم دیده بودیم،<br>
  با مشهورترین کارآگاه جهان یکی شد.<br>
  حاصل این پیوند پنج‌حرفی چیست؟
</div>

<!-- باکس معما -->
<div class="puzzle-box" id="box">
  <div>جواب معما را وارد کنید:</div><br>
  <input type="text" id="answer" placeholder="پاسخ...">
  <button onclick="check()">تأیید</button>
  <div class="msg" id="msg"></div>
</div>

<script>

// بعد چند ثانیه باکس میاد پایین صفحه
setTimeout(()=>{
  document.getElementById("box").classList.add("show");
},4000);

// بررسی جواب
function check(){
  let val = document.getElementById("answer").value.trim();

  if(val === "شهروک"){
    document.getElementById("msg").innerHTML = "✔ دسترسی تأیید شد...";

    setTimeout(()=>{
      window.location.href = "day.html"; // یا صفحه بعدی اگر خواستی
    },1500);

  }else{
    document.getElementById("msg").innerHTML = "✖ پاسخ اشتباه است...";
  }
}
</script>

</body>
</html>
