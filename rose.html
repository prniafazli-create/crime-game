<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{
background:#0b0b0f;
color:#fff;
overflow:hidden;
}

/*================ TOP =================*/

.top{
position:fixed;
top:0;
right:0;
left:0;
height:60px;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 15px;
background:rgba(18,18,25,.9);
backdrop-filter:blur(14px);
border-bottom:1px solid rgba(255,255,255,.08);
z-index:20;
}

.profile{
display:flex;
align-items:center;
gap:10px;
}

.avatar{
width:38px;
height:38px;
border-radius:50%;
object-fit:cover;
}

.name{
font-size:15px;
font-weight:bold;
}

.callBox{
display:flex;
gap:18px;
font-size:22px;
}

.callBox div{
cursor:pointer;
}

/*================ CHAT =================*/

#chat{
position:fixed;
top:60px;
bottom:70px;
left:0;
right:0;
overflow-y:auto;
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
}

.msg{
max-width:76%;
padding:10px 12px;
border-radius:15px;
font-size:14px;
line-height:1.6;
word-break:break-word;
animation:pop .2s;
}

@keyframes pop{
from{
transform:scale(.95);
opacity:0;
}
to{
transform:scale(1);
opacity:1;
}
}

.other{
align-self:flex-end;
background:#3b1020;
}

.me{
align-self:flex-start;
background:#202030;
}

.time{
font-size:10px;
opacity:.5;
margin-top:4px;
text-align:left;
}

/*================ INPUT =================*/

.inputBox{
position:fixed;
bottom:0;
left:0;
right:0;
height:70px;
background:#171722;
display:flex;
align-items:center;
gap:8px;
padding:10px;
}

#text{
flex:1;
height:42px;
background:#252535;
border:none;
outline:none;
border-radius:25px;
padding:0 15px;
color:white;
font-size:14px;
}

.send,
.voice{
width:42px;
height:42px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
background:#333;
cursor:pointer;
font-size:18px;
}

/*================ VOICE =================*/

.voiceMsg{
background:#252535;
border-radius:15px;
padding:10px;
display:flex;
flex-direction:column;
gap:8px;
max-width:75%;
align-self:flex-start;
}

.voiceMsg audio{
width:220px;
}

/*================ CALL =================*/

#callScreen{
position:fixed;
inset:0;
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
background:#050505;
z-index:99999;
}

.callAvatar{
width:145px;
height:145px;
border-radius:50%;
overflow:hidden;
border:2px solid rgba(255,255,255,.12);
}

.callAvatar img{
width:100%;
height:100%;
object-fit:cover;
}

.callName{
margin-top:22px;
font-size:24px;
font-weight:bold;
}

.callState{
margin-top:8px;
opacity:.75;
font-size:15px;
}

.endCall{
margin-top:60px;
width:78px;
height:78px;
border-radius:50%;
background:#d60022;
display:flex;
justify-content:center;
align-items:center;
font-size:34px;
cursor:pointer;
}

</style>

</head>

<body>

<audio id="ring" src="bogh.mp3"></audio>

<div class="top">

<div class="profile">

<img src="dar.png" class="avatar">

<div class="name">
گل سفید
</div>

</div>

<div class="callBox">

<div onclick="startCall()">📞</div>

<div onclick="fakeVideo()">🎥</div>

</div>

</div>

<div id="chat"></div>

<div class="inputBox">

<div class="voice"
onmousedown="startRec()"
onmouseup="stopRec()"
ontouchstart="startRec()"
ontouchend="stopRec()">
🎤
</div>

<input
id="text"
placeholder="پیام بنویس...">

<div
class="send"
onclick="sendMsg()">
➤
</div>

</div>

<div id="callScreen">

<div class="callAvatar">

<img src="dar.png">

</div>

<div class="callName">
گل سفید
</div>

<div class="callState">
در حال تماس...
</div>

<div class="endCall"
onclick="endCall()">
📞
</div>

</div>

<script>

const chat=document.getElementById("chat");
const ring=document.getElementById("ring");
const callScreen=document.getElementById("callScreen");

const messages=[

{
type:"me",
text:"سلام زیبارو.",
time:"12:00"
},

{
type:"other",
text:"سلام شما؟",
time:"12:01"
},

{
type:"me",
text:"یعنی نمیشناسی دیگه لوبیا خانم؟",
time:"12:02"
},

{
type:"other",
text:"عهههه....",
time:"12:03"
},

{
type:"other",
text:"یه سؤال بپرسم؟",
time:"12:04"
},

{
type:"me",
text:"فقط یک دونه؟",
time:"12:05"
},

{
type:"other",
text:"جدی میگم.",
time:"12:06"
},

{
type:"me",
text:"باشه.",
time:"12:07"
},

{
type:"other",
text:"تو این شماره رو از کجا پیدا کردی؟",
time:"12:08"
},

{
type:"me",
text:"از همون جایی که آدم‌ها چیزای مهمشون رو پنهان می‌کنن.",
time:"12:09"
},

{
type:"other",
text:"این جواب نیست.",
time:"12:10"
},

{
type:"me",
text:"می‌دونم.",
time:"12:11"
},

{
type:"other",
text:"حتی توی اون یکی گوشیم هم ذخیره‌ش نکرده بودم.",
time:"12:12"
},

{
type:"me",
text:"پس معلومه خوب قایمش کرده بودی.",
time:"12:13"
},

{
type:"other",
text:"...",
time:"12:14"
},

{
type:"other",
text:"گاهی واقعاً نمی‌فهمم تو باید نگرانم کنی یا نه.",
time:"12:15"
},

{
type:"me",
text:"و به چی رسیدی؟",
time:"12:16"
},

{
type:"other",
text:"به اینکه اگه آدم‌ها رو فقط با عجیب بودنشون قضاوت کنیم، نصف دنیا باید تنها بمونه.",
time:"12:17"
},

{
type:"me",
text:"تو زیادی به آدم‌ها فرصت میدی.",
time:"12:18"
},

{
type:"other",
text:"و تو زیادی زود خودتو ازشون محروم می‌کنی.",
time:"12:19"
},

{
type:"me",
text:"شاید.",
time:"12:20"
},

{
type:"other",
text:"راستی...",
time:"12:21"
},

{
type:"other",
text:"با این حال هنوز جواب پیام‌هات رو میدم.",
time:"12:22"
},

{
type:"me",
text:"متوجه شدم.",
time:"12:23"
},

{
type:"other",
text:"مغرور نشو.",
time:"12:24"
},

{
type:"me",
text:"دیر گفتی.",
time:"12:25"
}

];

let recorder;
let chunks=[];
let callTimer;

function render(){

chat.innerHTML="";
  messages.forEach(m=>{

const div=document.createElement("div");

if(m.voice){

div.className="voiceMsg";

div.innerHTML=`
🎤 پیام صوتی
<audio controls src="${m.voice}"></audio>
<div class="time">${m.time}</div>
`;

}else{

div.className="msg "+m.type;

div.innerHTML=`
${m.text}
<div class="time">${m.time}</div>
`;

}

chat.appendChild(div);

});

chat.scrollTop=chat.scrollHeight;

}

/* نمایش اولیه */
render();

/* ارسال پیام */

function sendMsg(){

const input=document.getElementById("text");

if(input.value.trim()=="") return;

const now=new Date();

messages.push({

type:"me",

text:input.value,

time:
now.getHours()+":"+
String(now.getMinutes()).padStart(2,"0")

});

input.value="";

/* نمایش اولیه */
render();

setTimeout(()=>{

const typing=document.createElement("div");
typing.className="msg other";
typing.id="typing";
typing.innerText="گل سفید در حال نوشتن...";
chat.appendChild(typing);
chat.scrollTop=chat.scrollHeight;

setTimeout(()=>{

typing.remove();

const ring=new Audio("ring.mp3");
ring.play().catch(()=>{});

messages.push({
type:"me",
text:"دیر گفتی.",
time:new Date().getHours()+":"+String(new Date().getMinutes()).padStart(2,"0")
});

render();

},2500);

},3000);

/* ارسال پیام */

function sendMsg(){


/* تماس صوتی */

function startCall(){

callScreen.style.display="flex";

ring.currentTime=0;

ring.play().catch(()=>{});

if(navigator.vibrate){

navigator.vibrate([400,200,400,200,400]);

}

clearTimeout(callTimer);

callTimer=setTimeout(()=>{

endCall();

},8000);

}

/* پایان تماس */

function endCall(){

callScreen.style.display="none";

ring.pause();

ring.currentTime=0;

clearTimeout(callTimer);

}

/* تماس تصویری فیک */

function fakeVideo(){

alert("تماس تصویری در دسترس نیست.");

}

/* ضبط ویس */

async function startRec(){

try{

const stream=
await navigator.mediaDevices.getUserMedia({
audio:true
});

recorder=new MediaRecorder(stream);

chunks=[];

recorder.ondataavailable=e=>{

chunks.push(e.data);

};

recorder.onstop=()=>{

const blob=
new Blob(chunks,{
type:"audio/webm"
});

const url=
URL.createObjectURL(blob);

const now=new Date();

messages.push({

voice:url,

time:
now.getHours()+":"+
String(now.getMinutes()).padStart(2,"0")

});

render();

/* بستن میکروفون */

stream.getTracks().forEach(track=>track.stop());

};

recorder.start();

}catch(e){

alert("اجازه دسترسی به میکروفون داده نشد.");

}

}

function stopRec(){

if(recorder &&
recorder.state!=="inactive"){

recorder.stop();

}

}

</script>

</body>
</html>
