<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>قاتل کیست؟</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
min-height:100vh;
background:url('marg.png') center center/cover no-repeat;
display:flex;
justify-content:center;
align-items:center;
font-family:Tahoma, sans-serif;
padding:20px;
overflow:hidden;
}

body::before{
content:"";
position:fixed;
inset:0;
background:rgba(0,0,0,0.65);
}

.overlay{
position:relative;
z-index:2;
background:rgba(0,0,0,0.55);
width:100%;
max-width:450px;
padding:35px;
border-radius:18px;
text-align:center;
backdrop-filter:blur(5px);
border:1px solid rgba(255,255,255,0.15);
}

.confidential{
color:#ff4d4d;
letter-spacing:3px;
font-weight:bold;
margin-bottom:8px;
}

.casefile{
color:#cfcfcf;
font-size:14px;
margin-bottom:20px;
}

#typewriter{
color:white;
min-height:110px;
line-height:1.8;
font-size:22px;
margin-bottom:20px;
}

.cursor{
animation:blink 0.8s infinite;
}

@keyframes blink{
50%{opacity:0;}
}

input{
width:100%;
padding:14px;
border:none;
border-radius:10px;
font-size:16px;
text-align:center;
margin-bottom:15px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:16px;
font-weight:bold;
}

.message{
margin-top:15px;
font-size:16px;
font-weight:bold;
min-height:25px;
}

.success{
color:#4cff4c;
}

.error{
color:#ff4c4c;
}

.counter{
color:#d6d6d6;
margin-top:10px;
font-size:14px;
}

.shake{
animation:shake 0.4s;
}

@keyframes shake{
0%{transform:translateX(0);}
20%{transform:translateX(-8px);}
40%{transform:translateX(8px);}
60%{transform:translateX(-8px);}
80%{transform:translateX(8px);}
100%{transform:translateX(0);}
}

.flash{
animation:flashSuccess 1s ease;
}

@keyframes flashSuccess{
0%{box-shadow:0 0 0 rgba(0,255,0,0);}
50%{box-shadow:0 0 50px rgba(0,255,0,0.8);}
100%{box-shadow:0 0 0 rgba(0,255,0,0);}
}

#finalMessage{
margin-top:15px;
color:#4cff4c;
line-height:1.8;
display:none;
}
</style>
</head>

<body>

<div class="overlay" id="box">

<div class="confidential">CONFIDENTIAL</div>

<div class="casefile">
پرونده بسته شد

آخرین گزارش بازپرس
</div>

<div id="typewriter"></div>

<input
type="text"
id="answer"
placeholder="نام قاتل را وارد کنید"
>

<button onclick="checkAnswer()">
بررسی پاسخ
</button>

<div id="message" class="message"></div>

<div id="finalMessage"></div>

<div class="counter">
تعداد تلاش: <span id="attempts">0</span>
</div>

</div>

<script>
const text =
`پس از بررسی تمام مدارک...

تنها یک سؤال باقی مانده است...

قاتل کیست؟`;

let i = 0;
let attempts = 0;

function typeWriter() {

if(i < text.length){

document.getElementById("typewriter").innerHTML =
text.substring(0,i+1) +
'<span class="cursor">|</span>';

i++;
setTimeout(typeWriter,45);
}
}

typeWriter();

function checkAnswer(){

const input = document.getElementById("answer");
const answer = input.value.trim().toLowerCase();

const message = document.getElementById("message");
const finalMessage = document.getElementById("finalMessage");
const box = document.getElementById("box");

if(
answer === "الیزابت" ||
answer === "الیزابت بومونت"
){

message.className = "message success";
message.innerText = "✓ پاسخ درست است";

box.classList.add("flash");

finalMessage.style.display = "block";
finalMessage.innerHTML =
"در حال تأیید نتیجه تحقیقات...

هویت قاتل تأیید شد.";

setTimeout(function(){
window.location.href = "story.html";
},2500);

}else{

attempts++;
document.getElementById("attempts").innerText = attempts;

message.className = "message error";
message.innerText = "✗ پاسخ غلط است";

box.classList.remove("shake");
void box.offsetWidth;
box.classList.add("shake");
}
}

document.getElementById("answer").addEventListener("keypress",function(e){

if(e.key === "Enter"){
checkAnswer();
}

});
</script>

</body>
</html>
